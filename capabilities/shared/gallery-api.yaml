naftiko: "1.0.0-alpha1"

info:
  label: "VS Code Marketplace Gallery API"
  description: "REST API for querying, searching, and downloading VS Code extensions from the Visual Studio Marketplace."
  tags:
    - Developer Tools
    - Extensions
    - IDE
    - Marketplace
    - Microsoft
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys: {}

capability:
  consumes:
    - type: http
      namespace: vscode-gallery
      baseUri: https://marketplace.visualstudio.com/_apis/public/gallery
      description: "VS Code Marketplace Gallery API for extension discovery and download."
      resources:
        - name: extension-query
          path: /extensionquery
          description: "Query and search extensions in the Marketplace."
          operations:
            - name: query-extensions
              method: POST
              description: "Search and filter VS Code extensions by keyword, tag, category, or extension ID."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter criteria."
                - name: flags
                  in: body
                  type: integer
                  required: false
                  description: "Response detail bitmask (16863 = all attributes)."
                - name: assetTypes
                  in: body
                  type: array
                  required: false
                  description: "Specific asset types to include."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: extension-download
          path: /publishers/{publisherName}/vsextensions/{extensionName}/{version}/vspackage
          description: "Download extension VSIX packages."
          operations:
            - name: download-extension
              method: GET
              description: "Download the VSIX package for a specific extension version."
              inputParameters:
                - name: publisherName
                  in: path
                  type: string
                  required: true
                  description: "Publisher name (e.g., ms-python)."
                - name: extensionName
                  in: path
                  type: string
                  required: true
                  description: "Extension name (e.g., python)."
                - name: version
                  in: path
                  type: string
                  required: true
                  description: "Version string or 'latest'."
              outputRawFormat: binary
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: publisher
          path: /publishers/{publisherName}
          description: "Retrieve publisher information."
          operations:
            - name: get-publisher
              method: GET
              description: "Get details about a specific Marketplace publisher."
              inputParameters:
                - name: publisherName
                  in: path
                  type: string
                  required: true
                  description: "Publisher unique name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vscode-gallery-rest
      resources:
        - path: /v1/extensions/search
          name: extension-search
          description: "Search for VS Code extensions."
          operations:
            - method: POST
              name: query-extensions
              description: "Query extensions by text, tag, or category."
              call: "vscode-gallery.query-extensions"
              with:
                filters: "rest.filters"
                flags: "rest.flags"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/publishers/{publisherName}
          name: publisher
          description: "Get publisher information."
          operations:
            - method: GET
              name: get-publisher
              description: "Retrieve publisher details."
              call: "vscode-gallery.get-publisher"
              with:
                publisherName: "rest.publisherName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: vscode-gallery-mcp
      transport: http
      tools:
        - name: search-extensions
          description: "Search VS Code Marketplace for extensions by keyword, tag, or category."
          hints:
            readOnly: true
            idempotent: true
          call: "vscode-gallery.query-extensions"
          with:
            filters: "tools.filters"
            flags: "tools.flags"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-publisher
          description: "Get information about a VS Code Marketplace publisher."
          hints:
            readOnly: true
            idempotent: true
          call: "vscode-gallery.get-publisher"
          with:
            publisherName: "tools.publisherName"
          outputParameters:
            - type: object
              mapping: "$."
