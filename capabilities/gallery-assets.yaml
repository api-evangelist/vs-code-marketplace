naftiko: 1.0.0-alpha2
info:
  label: VS Code Marketplace Gallery API — Assets
  description: 'VS Code Marketplace Gallery API — Assets. 1 operations. Lead operation: Download Extension VSIX Package. Self-contained
    Naftiko capability covering one Vs Code Marketplace business surface.'
  tags:
  - Vs Code Marketplace
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VS_CODE_MARKETPLACE_API_KEY: VS_CODE_MARKETPLACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: gallery-assets
    baseUri: https://marketplace.visualstudio.com/_apis/public/gallery
    description: VS Code Marketplace Gallery API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: publishers-publisherName-vsextensions-extensionName-version-vspackage
      path: /publishers/{publisherName}/vsextensions/{extensionName}/{version}/vspackage
      operations:
      - name: downloadextension
        method: GET
        description: Download Extension VSIX Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publisherName
          in: path
          type: string
          description: The publisher's unique name (e.g., ms-python).
          required: true
        - name: extensionName
          in: path
          type: string
          description: The extension's unique name (e.g., python).
          required: true
        - name: version
          in: path
          type: string
          description: Extension version (e.g., 2024.1.0) or "latest".
          required: true
  exposes:
  - type: rest
    namespace: gallery-assets-rest
    port: 8080
    description: REST adapter for VS Code Marketplace Gallery API — Assets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/publishers/{publishername}/vsextensions/{extensionname}/{version}/vspackage
      name: publishers-publishername-vsextensions-extensionname-version-vspackage
      description: REST surface for publishers-publisherName-vsextensions-extensionName-version-vspackage.
      operations:
      - method: GET
        name: downloadextension
        description: Download Extension VSIX Package
        call: gallery-assets.downloadextension
        with:
          publisherName: rest.publisherName
          extensionName: rest.extensionName
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gallery-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for VS Code Marketplace Gallery API — Assets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: download-extension-vsix-package
      description: Download Extension VSIX Package
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gallery-assets.downloadextension
      with:
        publisherName: tools.publisherName
        extensionName: tools.extensionName
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
